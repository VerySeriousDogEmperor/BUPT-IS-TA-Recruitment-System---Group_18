<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Applicants - MO Portal</title>
    <link rel="stylesheet" href="/static/css/mo/applicants.css">
    <link rel="stylesheet" href="/static/css/mo/theme.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">MO Portal</div>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item">
                <i data-lucide="layout-dashboard"></i>
                <span>Dashboard</span>
            </a>
            <a href="jobs.html" class="nav-item">
                <i data-lucide="briefcase"></i>
                <span>My Modules</span>
            </a>
            <a href="post-job.html" class="nav-item">
                <i data-lucide="plus-circle"></i>
                <span>Post Job</span>
            </a>
            <a href="applicants.html" class="nav-item active">
                <i data-lucide="users"></i>
                <span>Applicants</span>
            </a>
            <a href="timesheets.html" class="nav-item">
                <i data-lucide="clock"></i>
                <span>Timesheets</span>
            </a>
            <a href="knowledge-base.html" class="nav-item">
                <i data-lucide="book-open"></i>
                <span>Knowledge Base</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-profile">
                <div class="user-avatar">MO</div>
                <div class="user-info">
                    <div class="user-name">Module Owner</div>
                    <div class="user-role">COMP101</div>
                </div>
                <button class="logout-btn" onclick="handleLogout()" title="Logout">
                    <i data-lucide="log-out"></i>
                </button>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="content-wrapper">
            <div class="page-header">
                <div>
                    <h1>All Applicants</h1>
                    <p class="page-subtitle"><span id="candidateCount">0</span> candidates · Sem 1, 2026</p>
                </div>
                <div class="header-actions">
                    <button class="btn-secondary" id="exportBtn">
                        <i data-lucide="download"></i>
                        <span>Export</span>
                    </button>
                    <button class="btn-primary" id="refreshBtn">
                        <i data-lucide="refresh-cw"></i>
                        <span>Refresh</span>
                    </button>
                </div>
            </div>

            <div class="filter-bar">
                <div class="search-box">
                    <i class="search-icon" data-lucide="search"></i>
                    <input type="text" id="searchInput" placeholder="Search name, ID...">
                    <i class="clear-search" id="clearSearch" data-lucide="x"></i>
                </div>

                <div class="filter-select-wrapper">
                    <select id="stageFilter" class="filter-select">
                        <option value="all">All Statuses</option>
                        <option value="pending">Pending</option>
                        <option value="approved">Approved</option>
                        <option value="rejected">Rejected</option>
                        <option value="withdrawn">Withdrawn</option>
                    </select>
                </div>

                <div class="filter-select-wrapper">
                    <select id="moduleFilter" class="filter-select">
                        <option value="all">All Modules</option>
                    </select>
                </div>

                <div class="filter-select-wrapper">
                    <select id="matchFilter" class="filter-select">
                        <option value="all">All GPA Bands</option>
                        <option value="high">GPA 3.5 and above</option>
                        <option value="low">Below GPA 3.5</option>
                    </select>
                </div>

                <div class="sort-buttons">
                    <span class="sort-label">Sort:</span>
                    <button class="sort-btn active purple" data-sort="date">Latest</button>
                    <button class="sort-btn" data-sort="gpa">GPA</button>
                    <button class="sort-btn" data-sort="name">Name</button>
                </div>
            </div>

            <div class="table-container">
                <table class="applicants-table">
                    <thead>
                        <tr>
                            <th>Candidate</th>
                            <th>Module</th>
                            <th>GPA</th>
                            <th>Status</th>
                            <th>Applied</th>
                            <th>Review</th>
                        </tr>
                    </thead>
                    <tbody id="applicantsTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="drawer-overlay" id="drawerOverlay"></div>

    <div class="drawer" id="candidateDrawer">
        <div class="drawer-header">
            <button class="drawer-close" id="drawerClose">
                <i data-lucide="x"></i>
            </button>
            <div id="drawerHeaderContent"></div>
        </div>
        <div class="drawer-body" id="drawerBody"></div>
        <div class="drawer-footer" id="drawerFooter"></div>
    </div>

    <script src="/static/js/utils/api.js"></script>
    <script src="/static/js/pages/mo/common.js"></script>
    <script src="/static/js/pages/mo/applicants.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
